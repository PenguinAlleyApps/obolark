<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBOLARK — Tab II · Tollkeepers Refresh</title>

  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="ambient-fx.css" />

  <style>
    /* ══════════════════════════════════════════════════════════════════
       TAB II — TOLLKEEPERS (endpoint catalog) refresh.

       Audit-driven fixes applied here:
       · <table> uses border-collapse: collapse so dashed row rules paint
       · Arcscan/tollkeeper address links in --pale-brass (was --muted)
       · CROSS button: ember border idle, brass-gold fill on hover
         (matches BRAND_SPEC Tab I hero CTA + spec §Tollkeepers refresh)
       · <th> headers white-space:nowrap; Description wraps in <td>
       · Settlement flash on row via .ledger-row[data-settled=true]
       · No shadows on chrome; CROSS button drops the ember halo
       · Codename in Cinzel, PA·co code small-caps mono, epithet italic
       ══════════════════════════════════════════════════════════════════ */

    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bone);
      color: var(--ink);
      min-height: 100vh;
    }

    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Minimal masthead strip (for context, not the full refresh) ─── */
    .mini-mast {
      padding: 14px 32px;
      border-top: 3px solid var(--ink);
      border-bottom: 1px solid var(--brand-rule);
      background: var(--brand-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-muted);
    }
    .mini-mast .brand {
      font-family: var(--font-mythic);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.015em;
      color: var(--signal);
      text-transform: none;
    }
    .mini-mast .brand .dot { color: var(--ember); }
    .mini-mast .folio {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--brand-rule);
      padding: 5px 10px 4px;
      color: var(--ink);
    }

    /* ─── Tab strip (dormant chrome, just Tab II active) ─── */
    .tabstrip {
      display: flex; gap: 22px; flex-wrap: wrap;
      padding: 10px 32px 12px;
      border-bottom: 1px solid var(--brand-rule);
      background: var(--brand-bg);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .tabstrip button {
      background: transparent; border: none; padding: 4px 0;
      font: inherit; letter-spacing: inherit; text-transform: inherit;
      color: var(--brand-muted); cursor: default;
    }
    .tabstrip button[aria-current="true"] {
      color: var(--signal);
      border-bottom: 1px solid var(--signal);
    }
    .tabstrip button .lbl { /* scoped so underline is only on label, not brackets */ }

    /* ─── Panel ─── */
    .panel {
      background: var(--bone);
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--grid-line);
      padding: 24px 32px 32px;
      position: relative;
    }

    .panel-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--grid-line);
      margin-bottom: 20px;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .panel-header .right {
      display: inline-flex; align-items: center; gap: 10px;
      color: var(--muted);
    }
    .panel-header .right .led {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--moss); box-shadow: 0 0 6px var(--moss);
      animation: led-blink 2s ease-in-out infinite;
    }

    /* ─── Table ─── */
    .toll-table-wrap { overflow-x: auto; }
    table.toll {
      width: 100%;
      border-collapse: collapse; /* ← audit fix: was 'separate' */
      font-family: var(--font-mono);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    table.toll thead th {
      text-align: left;
      padding: 10px 16px 10px 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap; /* ← audit fix */
      border-bottom: 1px solid var(--grid-line);
    }
    table.toll thead th.num { text-align: right; padding-right: 20px; }
    table.toll thead th.cross { text-align: right; padding-left: 20px; padding-right: 0; }

    table.toll tbody td {
      padding: 14px 16px 14px 0;
      border-bottom: 1px dashed var(--grid-line); /* row rule on each td */
      vertical-align: top;
    }
    table.toll tbody td.num { text-align: right; padding-right: 20px; }
    table.toll tbody td.cross { text-align: right; padding-left: 20px; padding-right: 0; white-space: nowrap; }
    table.toll tbody td.desc { white-space: normal; color: var(--muted); max-width: 32ch; }

    table.toll tbody tr {
      transition: background-color 220ms ease-out;
    }
    table.toll tbody tr[data-settled="true"] td {
      animation: signal-pulse-row var(--motion-fade) ease-out;
    }
    @keyframes signal-pulse-row {
      0%   { background-color: color-mix(in oklab, var(--signal) 26%, transparent); }
      100% { background-color: transparent; }
    }
    table.toll tbody tr:hover td {
      background-color: color-mix(in oklab, var(--signal) 5%, transparent);
    }

    /* ─── Route cell ─── */
    .route {
      display: inline-flex; align-items: baseline; gap: 8px;
      color: var(--ink);
    }
    .route .verb {
      display: inline-block;
      padding: 2px 6px 1px;
      border: 1px solid var(--grid-line);
      color: var(--pale-brass);
      font-size: 9.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 2px;
    }
    .route .path {
      font-weight: 700;
      color: var(--ink);
      font-size: 13px;
    }

    /* ─── Tollkeeper cell ─── */
    .tollkeeper {
      display: inline-flex; align-items: baseline; gap: 10px;
      flex-wrap: wrap;
    }
    .tollkeeper .status-led { align-self: center; }
    .tollkeeper .codename {
      font-family: var(--font-mythic);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
    .tollkeeper .paco {
      font-family: var(--font-mono);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .tollkeeper .addr {
      display: block;
      width: 100%;
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--pale-brass); /* ← audit fix: arcscan links brass-gold */
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .tollkeeper .addr:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ─── Price / supervision ─── */
    td.num .val {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    td.num .unit {
      display: block;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
    td.num .supervise-pct {
      color: var(--muted);
      font-size: 11px;
    }

    /* ─── CROSS button ─── */
    .cross-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: transparent;
      color: var(--ember);
      border: 1px solid var(--ember);
      border-radius: var(--radius-sharp);
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background-color 180ms ease-out,
        color 180ms ease-out,
        border-color 180ms ease-out,
        transform 120ms ease-out;
      font-variant-numeric: tabular-nums;
      min-width: 104px;
      justify-content: center;
    }
    .cross-btn .glyph { font-size: 11px; line-height: 1; }
    .cross-btn:hover,
    .cross-btn:focus-visible {
      background: var(--pale-brass);      /* ← brass-gold fill on hover per spec */
      color: #0D0D0D;
      border-color: var(--pale-brass);
      outline: none;
    }
    .cross-btn:active { transform: translateY(1px); }
    .cross-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

    .cross-btn[data-busy="true"] {
      cursor: progress;
      border-style: dashed;
    }
    .cross-btn[data-busy="true"] .glyph { animation: led-blink 1200ms ease-in-out infinite; }

    .cross-btn[data-done="true"] {
      background: var(--signal);
      color: #0D0D0D;
      border-color: var(--signal);
    }

    /* +1 ghost on settle */
    .plus-one {
      position: absolute;
      pointer-events: none;
      margin-left: 6px;
      margin-top: -18px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--signal);
      opacity: 0;
      animation: plus-one 900ms ease-out forwards;
    }
    @keyframes plus-one {
      0%   { opacity: 0; transform: translateY(0) scale(0.9); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-24px) scale(1.05); }
    }

    /* ─── Footer totals strip ─── */
    .totals {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--grid-line);
    }
    .metric {
      border-left: 2px solid var(--ink);
      padding-left: 14px;
    }
    .metric .k {
      font-family: var(--font-mono);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .metric .v {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-top: 4px;
      letter-spacing: -0.01em;
    }
    .metric .v[data-role="signal"] { color: var(--signal); }
    .metric .sub {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Toast stack */
    .toasts {
      position: fixed; right: 24px; bottom: 24px; z-index: 50;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 10px 14px;
      background: var(--ink);
      color: var(--bone);
      border: 1px solid var(--grid-line);
      border-left: 3px solid var(--signal);
      border-radius: var(--radius-sharp);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      max-width: 360px;
      box-shadow: 0 2px 10px rgba(0,0,0,.35);
      animation: toast-in 220ms ease-out;
    }
    .toast .hash {
      display: block;
      margin-top: 4px;
      color: var(--pale-brass);
      letter-spacing: 0.02em;
      text-transform: none;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile: table collapses into stacked rows */
    @media (max-width: 820px) {
      table.toll thead { display: none; }
      table.toll, table.toll tbody, table.toll tr, table.toll td { display: block; width: 100%; }
      table.toll tbody tr {
        border-bottom: 1px dashed var(--grid-line);
        padding: 14px 0;
      }
      table.toll tbody td {
        border-bottom: none;
        padding: 4px 0;
      }
      table.toll tbody td.num, table.toll tbody td.cross {
        text-align: left; padding-left: 0; padding-right: 0;
      }
      .totals { grid-template-columns: repeat(2, 1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
      .plus-one, .cross-btn[data-busy="true"] .glyph,
      table.toll tbody tr[data-settled="true"] td { animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "default",
      "showAddresses": true,
      "superviseMode": "absolute",
      "crossStyle": "brass-fill",
      "autoSettle": true
    }/*EDITMODE-END*/;

    /* ─── Endpoints data (mirrors live /api/state shape) ─── */
    const ENDPOINTS = [
      {
        verb: 'POST',
        path: '/api/research',
        seller: 'RADAR',
        codename: 'ORACLE',
        epithet: 'Pythia of Delphi',
        addr: '0x1a9f…c02e',
        price: '0.003000',
        supervisionPct: 3,
        supervisionFee: '0.000090',
        description: 'Forensic web research · DeepSeek-V3.2 via Featherless.',
      },
      {
        verb: 'POST',
        path: '/api/design-review',
        seller: 'PIXEL',
        codename: 'DAEDALUS',
        epithet: 'Artificer of the Labyrinth',
        addr: '0x4b22…71aa',
        price: '0.005000',
        supervisionPct: 3,
        supervisionFee: '0.000150',
        description: 'Layout critique · Kimi-K2-Instruct 1T.',
      },
      {
        verb: 'POST',
        path: '/api/qa',
        seller: 'SENTINEL',
        codename: 'CERBERUS',
        epithet: 'Three-Headed Guardian',
        addr: '0x09c3…d4e9',
        price: '0.002000',
        supervisionPct: 3,
        supervisionFee: '0.000060',
        description: 'Test-suite generation · Llama-3.1-8B.',
      },
      {
        verb: 'POST',
        path: '/api/security-scan',
        seller: 'PHANTOM',
        codename: 'THANATOS',
        epithet: 'Hand of the Soft Death',
        addr: '0x77de…1b58',
        price: '0.004000',
        supervisionPct: 3,
        supervisionFee: '0.000120',
        description: 'Static audit · Qwen3-8B on Apache 2.0.',
      },
      {
        verb: 'POST',
        path: '/api/audit',
        seller: 'ARGUS',
        codename: 'ARGUS',
        epithet: 'Hundred-Eyed Watchman',
        addr: '0x5ab1…8c77',
        price: '0.001500',
        supervisionPct: 3,
        supervisionFee: '0.000045',
        description: 'Cross-reference ledger assertions · Claude Haiku 4.5.',
      },
    ];

    /* ─── CROSS button ─── */
    function CrossButton({ endpoint, onSettled }) {
      const [state, setState] = useState('idle'); // idle | busy | done
      const [plusOne, setPlusOne] = useState(0);

      const handle = async () => {
        if (state !== 'idle') return;
        setState('busy');
        // Simulate Circle Nanopayments settlement (~600-900ms)
        const dur = 640 + Math.random() * 320;
        await new Promise(r => setTimeout(r, dur));
        setState('done');
        setPlusOne(p => p + 1);
        onSettled && onSettled(endpoint, dur);
        setTimeout(() => setState('idle'), 1800);
      };

      const label =
        state === 'busy' ? 'SETTLING'
        : state === 'done' ? 'CLEARED'
        : '◆ CROSS';

      return (
        <span style={{ position: 'relative', display: 'inline-block' }}>
          <button
            type="button"
            className="cross-btn"
            data-busy={state === 'busy'}
            data-done={state === 'done'}
            onClick={handle}
            aria-label={`Cross ${endpoint.path} — pay ${endpoint.price} USDC toll`}
          >
            {state === 'idle' && <span className="glyph" aria-hidden>◆</span>}
            {state === 'busy' && <span className="glyph" aria-hidden>●</span>}
            {state === 'done' && <span className="glyph" aria-hidden>✓</span>}
            <span>{label.replace('◆ ', '')}</span>
          </button>
          {plusOne > 0 && (
            <span key={plusOne} className="plus-one">+1</span>
          )}
        </span>
      );
    }

    /* ─── Row ─── */
    function TollRow({ e, settled, onSettled, t }) {
      return (
        <tr data-settled={settled}>
          <td>
            <span className="route">
              <span className="verb">{e.verb}</span>
              <span className="path">{e.path}</span>
            </span>
          </td>
          <td>
            <span className="tollkeeper">
              <span className="status-led" data-state="signal" aria-hidden />
              <span className="codename">{e.codename}</span>
              <span className="paco">· {e.seller}</span>
              {t.showAddresses && (
                <a
                  href={`https://testnet.arcscan.app/address/${e.addr.replace(/…/g,'')}`}
                  target="_blank"
                  rel="noreferrer"
                  className="addr"
                  title="Open on Arcscan"
                >
                  {e.addr} ↗
                </a>
              )}
            </span>
          </td>
          <td className="num">
            <span className="val">{e.price}</span>
            <span className="unit">USDC</span>
          </td>
          <td className="num">
            {t.superviseMode === 'percent'
              ? <>
                  <span className="val supervise-pct">+{e.supervisionPct}%</span>
                  <span className="unit">supervision</span>
                </>
              : <>
                  <span className="val">{e.supervisionFee}</span>
                  <span className="unit">USDC · fee</span>
                </>
            }
          </td>
          <td className="desc">
            <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', color: 'var(--muted)', display: 'block', fontSize: 11, marginBottom: 4 }}>
              {e.epithet}
            </span>
            {e.description}
          </td>
          <td className="cross">
            <CrossButton endpoint={e} onSettled={onSettled} />
          </td>
        </tr>
      );
    }

    /* ─── Toasts ─── */
    function Toasts({ items }) {
      return (
        <div className="toasts" aria-live="polite">
          {items.map((x) => (
            <div key={x.id} className="toast">
              <div>cleared · {x.path}</div>
              <span className="hash">0x{Math.random().toString(16).slice(2, 14)}…{Math.random().toString(16).slice(2, 6)}</span>
            </div>
          ))}
        </div>
      );
    }

    /* ─── Panel ─── */
    function Tollkeepers({ t }) {
      const [settled, setSettled] = useState({});   // path → boolean
      const [toasts, setToasts] = useState([]);
      const [stats, setStats] = useState({ crossings: 0, usdc: 0 });

      const onSettled = (endpoint) => {
        setSettled(s => ({ ...s, [endpoint.path]: true }));
        const id = Math.random().toString(36).slice(2);
        setToasts(ts => [...ts, { id, path: endpoint.path }]);
        setTimeout(() => {
          setToasts(ts => ts.filter(x => x.id !== id));
        }, 2600);
        setStats(s => ({
          crossings: s.crossings + 1,
          usdc: s.usdc + parseFloat(endpoint.price) + parseFloat(endpoint.supervisionFee),
        }));
        setTimeout(() => {
          setSettled(s => ({ ...s, [endpoint.path]: false }));
        }, 500);
      };

      return (
        <section className="panel">
          <div className="panel-header">
            <span>[ II · ENDPOINT CATALOG · TOLLS AT THE CROSSING ]</span>
            <span className="right">
              <span className="led" aria-hidden />
              POST · requires PAYMENT-SIGNATURE · x402 batched
            </span>
          </div>

          <div className="toll-table-wrap">
            <table className="toll">
              <thead>
                <tr>
                  <th>Route</th>
                  <th>Tollkeeper</th>
                  <th className="num">Base&nbsp;(USDC)</th>
                  <th className="num">Supervision</th>
                  <th>Description</th>
                  <th className="cross">Cross</th>
                </tr>
              </thead>
              <tbody>
                {ENDPOINTS.map(e => (
                  <TollRow
                    key={e.path}
                    e={e}
                    settled={!!settled[e.path]}
                    onSettled={onSettled}
                    t={t}
                  />
                ))}
              </tbody>
            </table>
          </div>

          <div className="totals">
            <div className="metric">
              <div className="k">Tollkeepers</div>
              <div className="v">{ENDPOINTS.length}</div>
              <div className="sub">monetised via x402</div>
            </div>
            <div className="metric">
              <div className="k">Crossings (session)</div>
              <div className="v" data-role="signal">{stats.crossings.toString().padStart(4, '0')}</div>
              <div className="sub">cleared · this surface</div>
            </div>
            <div className="metric">
              <div className="k">USDC settled</div>
              <div className="v">{stats.usdc.toFixed(6)}</div>
              <div className="sub">toll + supervision</div>
            </div>
            <div className="metric">
              <div className="k">Effective per-tx cost</div>
              <div className="v">0.000030</div>
              <div className="sub">USDC · Arc batched</div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Chrome ─── */
    function MiniMast() {
      return (
        <header className="mini-mast">
          <span className="brand">OBOLARK<span className="dot" aria-hidden>.</span></span>
          <span className="folio">
            <span className="status-led" data-state="ok" aria-hidden />
            Bureau Ledger · Vol. I · No. 1 · 2026-04-23
          </span>
          <span>Arc Testnet · chain_id 5042002</span>
        </header>
      );
    }

    function TabStrip() {
      const tabs = [
        'I · Front Page',
        'II · Tollkeepers',
        'III · Ledger',
        'IV · Agents',
        'V · Reputation',
        'VI · Archive',
        'VII · Orchestrations',
        'VIII · Oracle',
      ];
      return (
        <nav className="tabstrip">
          {tabs.map((t, i) => (
            <button key={t} aria-current={i === 1 ? 'true' : undefined}>
              [ {t} ]
            </button>
          ))}
        </nav>
      );
    }

    /* ─── App ─── */
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Auto-settle demo: pulses a random row every few seconds
      const [autoTick, setAutoTick] = useState(0);
      useEffect(() => {
        if (!t.autoSettle) return;
        const id = setInterval(() => setAutoTick(x => x + 1), 3200);
        return () => clearInterval(id);
      }, [t.autoSettle]);

      return (
        <div className="page">
          <MiniMast />
          <TabStrip />
          <Tollkeepers t={t} key={t.density + t.superviseMode} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Table" />
            <TweakRadio
              label="Density"
              value={t.density}
              options={['compact', 'default', 'comfy']}
              onChange={(v) => setTweak('density', v)}
            />
            <TweakToggle
              label="Show tollkeeper addresses"
              value={t.showAddresses}
              onChange={(v) => setTweak('showAddresses', v)}
            />

            <TweakSection label="Supervision column" />
            <TweakRadio
              label="Render as"
              value={t.superviseMode}
              options={['percent', 'absolute']}
              onChange={(v) => setTweak('superviseMode', v)}
            />

            <TweakSection label="Cross button" />
            <TweakRadio
              label="Style"
              value={t.crossStyle}
              options={['ember-outline', 'brass-fill', 'signal-ghost']}
              onChange={(v) => setTweak('crossStyle', v)}
            />

            <TweakSection label="Demo" />
            <TweakToggle
              label="Auto-settle pulse"
              value={t.autoSettle}
              onChange={(v) => setTweak('autoSettle', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    /* Apply crossStyle variant via class on :root */
    function CrossStyleBridge({ style }) {
      useEffect(() => {
        document.documentElement.setAttribute('data-cross-style', style);
      }, [style]);
      return null;
    }

    /* Inject density CSS overrides reactively via style tag */
    function DensityBridge({ density }) {
      const css = density === 'compact'
        ? `table.toll tbody td{padding:8px 16px 8px 0}`
        : density === 'comfy'
          ? `table.toll tbody td{padding:20px 16px 20px 0}`
          : '';
      return <style>{css}</style>;
    }

    function Root() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      // Apply data attrs for crossStyle variants
      useEffect(() => {
        const s = t.crossStyle;
        // Handle via inline style injection
        const tag = document.getElementById('cross-style-overrides') || (() => {
          const el = document.createElement('style');
          el.id = 'cross-style-overrides';
          document.head.appendChild(el);
          return el;
        })();
        tag.textContent =
          s === 'brass-fill' ? `
            .cross-btn{background:var(--pale-brass);color:#0D0D0D;border-color:var(--pale-brass)}
            .cross-btn:hover{background:var(--signal);border-color:var(--signal)}
          ` : s === 'signal-ghost' ? `
            .cross-btn{color:var(--signal);border-color:var(--signal)}
            .cross-btn:hover{background:var(--signal);color:#0D0D0D;border-color:var(--signal)}
          ` : ``; // ember-outline = CSS default
      }, [t.crossStyle]);

      return (
        <div className="page">
          <DensityBridge density={t.density} />
          <MiniMast />
          <TabStrip />
          <Tollkeepers t={t} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Table" />
            <TweakRadio
              label="Density"
              value={t.density}
              options={['compact', 'default', 'comfy']}
              onChange={(v) => setTweak('density', v)}
            />
            <TweakToggle
              label="Show addresses"
              value={t.showAddresses}
              onChange={(v) => setTweak('showAddresses', v)}
            />

            <TweakSection label="Supervision" />
            <TweakRadio
              label="Render as"
              value={t.superviseMode}
              options={['percent', 'absolute']}
              onChange={(v) => setTweak('superviseMode', v)}
            />

            <TweakSection label="CROSS button" />
            <TweakRadio
              label="Style"
              value={t.crossStyle}
              options={['ember-outline', 'brass-fill', 'signal-ghost']}
              onChange={(v) => setTweak('crossStyle', v)}
            />

            <TweakSection label="Demo" />
            <TweakToggle
              label="Auto-settle pulse"
              value={t.autoSettle}
              onChange={(v) => setTweak('autoSettle', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
